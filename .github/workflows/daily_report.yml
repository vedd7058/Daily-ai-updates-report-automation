name: 360° AI Daily Report

on:
  schedule:
    - cron: "30 13 * * *"
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install groq tavily-python pytz twilio

      - name: Run daily report
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY:     ${{ secrets.TAVILY_API_KEY }}
          GMAIL_SENDER:       ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_RECIPIENT:    ${{ secrets.GMAIL_RECIPIENT }}
          GMAIL_RECIPIENT_2:  ${{ secrets.GMAIL_RECIPIENT_2 }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:  ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM:        ${{ secrets.TWILIO_FROM }}
          TWILIO_TO:          ${{ secrets.TWILIO_TO }}
          TWILIO_TO_2:        ${{ secrets.TWILIO_TO_2 }}
        run: python daily_report.py
